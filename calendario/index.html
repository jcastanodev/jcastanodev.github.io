<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario de Tareas | jcastanodev</title>
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon" />
    <!-- Tailwind CSS para diseño rápido y consistente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel para transformar JSX y ES Modules en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen">
    <div id="root"></div>

    <!-- Cargamos los componentes modulares -->
    <script type="text/babel" src="./ConfirmModal.js"></script>
    <script type="text/babel" src="./WelcomeModal.js"></script>
    <script type="text/babel" src="./NewWeekModal.js"></script>
    <script type="text/babel" src="./ExtraTaskCard.js"></script>
    <script type="text/babel" src="./TaskCard.js"></script>

    <!-- Cargamos la lógica principal -->
    <script type="text/babel" src="./index.js"></script>

    <!-- 2. Renderizamos el componente una vez que Babel lo haya procesado -->
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <CalendarioTasks />
        );
    </script>
</body>

</html>
